worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    resolver      127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;
    client_max_body_size 20m;
    
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost; # Change to your actual domain on Aliyun like admin.xxx.com

        # Route Admin Web
        location / {
            set $admin_web_service admin-web;
            proxy_pass http://$admin_web_service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route Backend API
        location /api/ {
            set $backend_service backend;
            proxy_pass http://$backend_service:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route AI Service
        location /api/ai/ {
            set $ai_service ai-service;
            proxy_pass http://$ai_service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
