worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    resolver      127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;
    client_max_body_size 20m;
    
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost; # 部署到服务器时可替换为自己的域名

        # 前端页面代理
        location / {
            set $admin_web_service admin-web;
            proxy_pass http://$admin_web_service:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 后端接口代理
        location /api/ {
            set $backend_service backend;
            proxy_pass http://$backend_service:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # AI 服务代理
        location /api/ai/ {
            set $ai_service ai-service;
            proxy_pass http://$ai_service:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
