spring:
  application:
    name: jiangmai-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/jiangmai_db?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=GMT%2B8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

# JWT Authentication Configuration
jwt:
  secret: ${JWT_SECRET:JiangmaiSecretKey2026!}
  expiration-ms: ${JWT_EXPIRE_MS:86400000}

# DeepSeek Configuration
ai:
  provider: ${AI_PROVIDER:deepseek}

openai:
  api:
    key: ${OPENAI_API_KEY:}
    url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
    model: ${OPENAI_MODEL:gpt-4o-mini}

doubao:
  api:
    key: ${ARK_API_KEY:}
    url: ${DOUBAO_API_URL:https://ark.cn-beijing.volces.com/api/v3/chat/completions}
    model: ${DOUBAO_MODEL:doubao-seed-1-6-250615}

deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:}
    url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}
    model: ${DEEPSEEK_MODEL:deepseek-chat}

logging:
  level:
    com.jiangmai.platform: debug
